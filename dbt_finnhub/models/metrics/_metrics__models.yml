version: 2

models:
  - name: sector_performance
    columns:
      - name: date_key
        tests: [not_null]
      - name: sector
        tests: [not_null]
      - name: cumulative_return
        tests: [not_null]

  - name: sector_volatility
    columns:
      - name: sector
        tests: [not_null, unique]
      - name: annualized_volatility
        tests: [not_null]
