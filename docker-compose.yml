name: finnhub-market-analytics

x-pipeline-env: &pipeline-env
  FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
  GCP_PROJECT_ID: ${GCP_PROJECT_ID:-seismic-ground-488312-u6}
  GCS_BUCKET: ${GCS_BUCKET:-}
  RAW_PREFIX: ${RAW_PREFIX:-raw}
  CANDLES_PROVIDER: ${CANDLES_PROVIDER:-auto}
  FINNHUB_SYMBOLS: ${FINNHUB_SYMBOLS:-}
  GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
  BQ_LOCATION: ${BQ_LOCATION:-europe-west9}
  DBT_DATASET: ${DBT_DATASET:-finnhub_dw}

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file:
    - ./.env.docker
  environment:
    <<: *pipeline-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-secret-key-change-me}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow/ingestion/src
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./ingestion/src:/opt/airflow/ingestion/src
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ${HOME}/.config/gcloud:/home/airflow/.config/gcloud:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --role Admin \
          --username ${AIRFLOW_USERNAME:-airflow} \
          --password ${AIRFLOW_PASSWORD:-airflow} \
          --firstname ${AIRFLOW_FIRSTNAME:-Data} \
          --lastname ${AIRFLOW_LASTNAME:-Engineer} \
          --email ${AIRFLOW_EMAIL:-airflow@example.com} || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5

  ingestion:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    env_file:
      - ./.env.docker
    environment:
      <<: *pipeline-env
    working_dir: /app/ingestion
    volumes:
      - ./ingestion:/app/ingestion
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    command: ["daily"]

  dbt:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: dbt_finnhub/Dockerfile
    env_file:
      - ./.env.docker
    environment:
      <<: *pipeline-env
      DBT_PROFILES_DIR: /app/profiles
    working_dir: /app/dbt_finnhub
    volumes:
      - ./dbt_finnhub:/app/dbt_finnhub
      - ./dbt_finnhub/profiles.docker.yml:/app/profiles/profiles.yml:ro
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    command: ["--version"]

  terraform:
    profiles: ["tools"]
    image: hashicorp/terraform:1.8.5
    working_dir: /workspace/terraform
    volumes:
      - ./:/workspace
    entrypoint: ["terraform"]

  gcloud:
    profiles: ["tools"]
    image: google/cloud-sdk:slim
    env_file:
      - ./.env.docker
    environment:
      <<: *pipeline-env
      CLOUDSDK_CORE_PROJECT: ${GCP_PROJECT_ID:-}
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    command: ["gcloud", "--version"]

volumes:
  postgres_data:
