name: CD - Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/cd-terraform.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/cd-terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes"
        required: true
        default: false
        type: boolean

jobs:
  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest
    if: ${{ vars.GCP_PROJECT_ID != '' && vars.GCS_BUCKET != '' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
    permissions:
      contents: read
      id-token: write
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_bucket_name: ${{ vars.GCS_BUCKET }}
      TF_VAR_region: ${{ vars.GCP_REGION || 'europe-west9' }}
      TF_VAR_location: ${{ vars.BQ_LOCATION || 'europe-west9' }}
      TF_VAR_environment: ${{ vars.ENVIRONMENT || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == true }}
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

  terraform-missing-config:
    name: Terraform Config Missing
    runs-on: ubuntu-latest
    if: ${{ !(vars.GCP_PROJECT_ID != '' && vars.GCS_BUCKET != '' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '') }}
    steps:
      - name: Explain missing configuration
        run: |
          echo "Terraform workflow skipped."
          echo "Set these GitHub settings first:"
          echo "- Repository Variables: GCP_PROJECT_ID, GCS_BUCKET (optional: GCP_REGION, BQ_LOCATION, ENVIRONMENT)"
          echo "- Repository Secrets: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT"
