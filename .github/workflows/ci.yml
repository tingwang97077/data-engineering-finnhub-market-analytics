name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check ingestion/src airflow/dags

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ingestion/requirements.txt

      - name: Install ingestion dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Compile Python sources
        run: python -m compileall ingestion/src airflow/dags

      - name: Run unit tests (if any)
        run: |
          if [ -d ingestion/tests ] && [ -n "$(find ingestion/tests -type f -name 'test*.py' -print -quit)" ]; then
            python -m unittest discover -s ingestion/tests -p "test*.py"
          else
            echo "No unit tests found under ingestion/tests, skipping."
          fi

  dbt-parse:
    name: dbt Parse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dbt
        run: pip install dbt-core==1.11.6 dbt-bigquery==1.11.0

      - name: Install dbt packages
        working-directory: dbt_finnhub
        run: dbt deps

      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cp dbt_finnhub/profiles.yml.example ~/.dbt/profiles.yml

      - name: Parse dbt project
        working-directory: dbt_finnhub
        run: dbt parse
